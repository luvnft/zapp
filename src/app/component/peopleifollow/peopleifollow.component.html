<div>
  <h3 align="center">
    🕸 {{'People I follow'|translate}}
  </h3>
  <p align="center">{{'You can see the people you follow here'|translate}} 👇</p>
</div>

<div class="clr-row clr-justify-content-center">
  <div *ngIf="loadingPeopleYouFollow" class="clr-col-12 clr-col-md-8">
    <div class="event-loading-spinner clr-justify-content-center">
      <span class="spinner spinner-md" translate>Loading people you follow...</span>
    </div>
  </div>

  <div *ngIf="!(loadingPeopleYouFollow) && users?.length === 0"  class="clr-row clr-justify-content-center">
    <div class="alert-items">
        <div class="alert-item static clr-justify-content-center">
          <span class="alert-text">{{'Not following anyone yet. May be try following some people?'|translate}} <br/> {{'like'|translate}} <a href="https://snort.social/p/npub1s0k9j8vn4nnjwqcze568ayx83k32jardqfh7hrk7c3mlpqkwgj0qucp3c9">@hahz</a>?</span>
        </div>
    </div>
  </div>

  <div *ngFor="let item of users" class="clr-col-12 clr-col-md-8">
    <app-contact-card [contact]="item" [showFollow] = "true" (contactListUpdated)="onContactListChange()"></app-contact-card>
  </div>

</div>
